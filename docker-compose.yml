services:
  orders-api:
    image: manuelsalgadofuentes/orders-api:latest
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    env_file:
      - path: ../.env
        required: false  # Crear .env en D:\Proyectos Personales\ desde env.example con secrets reales

  orders-front:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # API_URL debe ser la URL que el BROWSER del usuario puede alcanzar,
        # NO el nombre del servicio Docker (orders-api solo existe dentro de la red Docker)
        - API_URL=http://localhost:8080
    ports:
      - "4200:80"
    depends_on:
      - orders-api
