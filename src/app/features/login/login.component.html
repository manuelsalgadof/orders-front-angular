<div class="login-container">
  <form class="login-form" [formGroup]="form" (ngSubmit)="submit()">
    <h2>OrdersApi</h2>
    <p class="subtitle">Inicia sesión para continuar</p>

    @if (error) {
      <p class="error-msg">{{ error }}</p>
    }

    <div class="field">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        autocomplete="email"
        [class.invalid]="form.controls.email.invalid && form.controls.email.touched"
      />
      @if (form.controls.email.invalid && form.controls.email.touched) {
        <span class="field-error">Email requerido y válido.</span>
      }
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        [class.invalid]="form.controls.password.invalid && form.controls.password.touched"
      />
      @if (form.controls.password.invalid && form.controls.password.touched) {
        <span class="field-error">Contraseña requerida (mín. 8 caracteres).</span>
      }
    </div>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Ingresando…' : 'Ingresar' }}
    </button>
  </form>
</div>
